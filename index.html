<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>信用卡消費紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --pink:#FF84BA;
    --pink-deep:#E85A9B;
    --yellow:#FFDF82;
    --yellow-deep:#E0B93F;
    --blue:#99C2FF;
    --blue-deep:#5B8FE0;
    --cream:#FFEFE3;
    --bg:#FFF7ED;
    --card:#FFFFFF;
    --ink:#4A2E3D;
    --ink-soft:#8A6E7D;
    --line:#F1E0D6;
    --danger:#E85A5A;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    padding:20px 18px 100px;
    position:relative;
  }
  .top-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .brand{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:-0.3px;
  }
  .brand span{color:var(--pink-deep);}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:17px; cursor:pointer; color:var(--ink);
  }

  .card-hero{
    border-radius:var(--radius-lg);
    padding:20px 20px 18px;
    color:var(--ink);
    margin-bottom:16px;
    position:relative;
  }
  .card-hero .ch-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .card-hero .ch-name{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px;}
  .card-hero .ch-amount{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:32px; margin-top:10px; line-height:1;
  }
  .card-hero .ch-amount small{font-size:15px; font-weight:600; opacity:.7; margin-right:2px;}
  .card-hero .ch-sub{font-size:11px; opacity:.65; margin-top:6px;}
  .pay-btn{
    margin-top:14px; border:none; border-radius:14px;
    background:rgba(74,46,61,0.14); color:var(--ink); font-family:'Baloo 2',sans-serif;
    font-weight:700; font-size:13px; padding:10px 16px; cursor:pointer;
  }
  .pay-btn:active{transform:scale(.97);}

  .add-card{
    background:var(--card); border-radius:var(--radius-lg);
    padding:18px; margin-bottom:16px; border:1px solid var(--line);
  }
  .add-card h2{
    font-family:'Baloo 2',sans-serif; font-size:16px; margin:0 0 12px;
  }
  .field-row{display:flex; gap:10px; margin-bottom:10px;}
  .field{flex:1; display:flex; flex-direction:column; gap:5px;}
  label{font-size:11px; font-weight:600; color:var(--ink-soft);}
  input[type=number], input[type=text], input[type=date]{
    border:1.5px solid var(--line); border-radius:var(--radius-sm);
    padding:10px 12px; font-size:15px; font-family:'Inter',sans-serif;
    background:#FFFCFA; color:var(--ink); width:100%;
  }
  input:focus{outline:2px solid var(--blue); border-color:var(--blue);}
  
  /* 恢復為原本的加入紀錄分類樣式 (依照寬度自動換行) */
  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .chip{
    padding:7px 13px; border-radius:20px; font-size:13px; font-weight:600;
    border:1.5px solid var(--line); background:#fff; cursor:pointer; color:var(--ink-soft);
  }
  .chip.active{border-color:transparent; color:var(--ink);}
  
  .primary-btn{
    width:100%; border:none; border-radius:var(--radius-md);
    background:var(--ink); color:var(--cream); font-family:'Baloo 2',sans-serif;
    font-weight:700; font-size:15px; padding:13px; cursor:pointer;
  }
  .primary-btn:active{transform:scale(.98);}

  .tabs{display:flex; gap:5px; margin-bottom:14px; background:var(--card); padding:5px; border-radius:16px; border:1px solid var(--line);}
  .tab{
    flex:1; text-align:center; padding:9px 2px; border-radius:12px; font-size:13px;
    font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .tab.active{background:var(--yellow); color:var(--ink);}

  .panel{display:none;}
  .panel.active{display:block;}

  .list-item{
    background:var(--card); border-radius:var(--radius-md); padding:14px 14px;
    display:flex; align-items:center; gap:12px; margin-bottom:10px; border:1px solid var(--line);
  }
  .cat-dot{width:38px;height:38px;border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:var(--ink);}
  .li-main{flex:1; min-width:0;}
  .li-cat{font-size:12px; font-weight:600; color:var(--ink-soft); display:flex; gap:6px; align-items:center;}
  .li-note{font-size:14px; font-weight:500; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .li-date{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .li-amount{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; white-space:nowrap;}
  .li-amount.payment{color:#4C9A6A;}
  .li-actions{display:flex; gap:6px;}
  .li-actions button{
    border:none; background:var(--cream); width:28px; height:28px; border-radius:8px;
    font-size:13px; cursor:pointer; color:var(--ink);
  }
  .empty-state{
    text-align:center; padding:40px 20px; color:var(--ink-soft);
  }
  .empty-state .emoji{font-size:32px; margin-bottom:8px;}
  .empty-state p{font-size:13px; margin:4px 0 0; line-height:1.6;}

  /* 3欄並排分類管理項目 */
  .cat-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;}
  .manage-card{
    background:var(--card); border-radius:var(--radius-sm); padding:12px 8px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    border:1px solid var(--line); position:relative;
  }
  .color-dot-lg{width:28px;height:28px;border-radius:50%; flex-shrink:0; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line); cursor:pointer;}
  .manage-card input[type=text]{
    border:none; background:transparent; font-weight:600; font-size:13px; 
    padding:0; width:100%; text-align:center; color:var(--ink);
  }
  .manage-card .del-btn{
    position:absolute; top:2px; right:2px; border:none; background:transparent;
    color:var(--ink-soft); font-size:14px; cursor:pointer; padding:4px 8px;
  }
  .manage-card.dragging{ opacity:.35; }
  .drag-handle{
    position:absolute; top:2px; left:2px; font-size:15px; color:var(--ink-soft);
    padding:4px 8px; cursor:grab; touch-action:none; user-select:none;
  }
  .drag-ghost{
    box-shadow:0 10px 24px rgba(74,46,61,.35); transform:scale(1.04);
  }
  .save-indicator{
    font-size:10px; font-weight:700; color:#4C9A6A; opacity:0; height:12px;
    transition:opacity .3s; margin-top:2px;
  }
  .save-indicator.show{opacity:1;}

  .color-swatches{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 12px;}
  .color-swatches div{width:24px;height:24px;border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .color-swatches div.selected{border-color:var(--ink);}

  .chart-card{
    background:var(--card); border-radius:var(--radius-lg); padding:20px; border:1px solid var(--line); margin-bottom:16px;
  }
  .breakdown-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .breakdown-row:last-child{border-bottom:none;}
  .breakdown-row .dot{width:10px;height:10px;border-radius:50%;}
  .breakdown-row .name{flex:1; font-weight:600;}
  .breakdown-row .amt{font-family:'JetBrains Mono',monospace; font-weight:600;}

  .status-dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:6px;}
  .status-line{font-size:12px; color:var(--ink-soft); display:flex; align-items:center; margin-top:10px;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--cream); padding:11px 20px; border-radius:20px;
    font-size:13px; font-weight:600; z-index:50; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; max-width:90%; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(74,46,61,.45); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--bg); width:100%; max-width:480px; border-radius:24px 24px 0 0;
    padding:22px 20px 28px; max-height:85vh; overflow-y:auto;
  }
  .modal h3{font-family:'Baloo 2',sans-serif; margin:0 0 14px; font-size:17px;}
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions button{flex:1;}
  .ghost-btn{
    border:1.5px solid var(--line); background:#fff; border-radius:var(--radius-md);
    padding:13px; font-weight:700; font-family:'Baloo 2',sans-serif; font-size:14px; cursor:pointer; color:var(--ink-soft);
  }
  .hint{font-size:12px; color:var(--ink-soft); margin:-6px 0 12px;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div id="app">

  <div class="top-bar">
    <div class="brand">信用卡<span>消費紀錄</span></div>
    <div class="icon-btn" id="settingsBtn">⚙</div>
  </div>

  <div class="card-hero" style="background:var(--pink);">
    <div class="ch-top">
      <div><div class="ch-name">總計待收款</div></div>
    </div>
    <div class="ch-amount"><small>NT$</small><span id="heroTotal">0</span></div>
    <div class="ch-sub" id="heroLastPay">尚未有繳費紀錄</div>
    <button class="pay-btn" id="globalPayBtn">登記繳費 / 扣款</button>
  </div>

  <div class="add-card">
    <h2>記一筆消費</h2>
    <div class="field-row">
      <div class="field">
        <label>金額</label>
        <input type="number" id="amountInput" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="dateInput">
      </div>
    </div>
    <div class="field" style="margin-bottom:12px;">
      <label>備註</label>
      <input type="text" id="noteInput" placeholder="例如：午餐、捷運、網購…">
    </div>
    <label style="margin-bottom:8px; display:block;">分類</label>
    <div class="chip-row" id="catPicker"></div>
    <button class="primary-btn" id="addExpenseBtn">＋ 加入紀錄</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="list">紀錄</div>
    <div class="tab" data-tab="chart">分析</div>
    <div class="tab" data-tab="categories">分類</div>
  </div>

  <div class="panel active" id="panel-list">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="tabs" style="margin-bottom:0; width:130px; padding:4px;">
        <div class="tab active" id="listTabMonth" style="padding:4px 2px;">月份</div>
        <div class="tab" id="listTabYear" style="padding:4px 2px;">年度</div>
      </div>
      <button class="ghost-btn" id="clearExpensesBtn" style="width:auto; padding:8px 14px; font-size:12px;">🗑 清空紀錄</button>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; background:#FFFCFA; border:1px solid var(--line); border-radius:14px; padding:6px;">
      <button class="icon-btn" id="listPrevBtn" style="width:36px;height:36px;border:none;background:transparent;box-shadow:none;">&lt;</button>
      <div style="text-align:center;">
        <div id="listPeriodLabel" style="font-weight:700; font-size:15px;"></div>
        <div id="listPeriodSub" style="font-size:11px; color:var(--ink-soft); margin-top:2px;"></div>
      </div>
      <button class="icon-btn" id="listNextBtn" style="width:36px;height:36px;border:none;background:transparent;box-shadow:none;">&gt;</button>
    </div>
    <div id="listContent"></div>
  </div>

  <div class="panel" id="panel-chart">
    <div class="chart-card">
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2 style="margin:0; font-family:'Baloo 2',sans-serif; font-size:16px;">佔比分析</h2>
        <div class="tabs" style="margin-bottom:0; width:130px; padding:4px;">
          <div class="tab active" id="chartTabMonth" style="padding:4px 2px;">月份</div>
          <div class="tab" id="chartTabYear" style="padding:4px 2px;">年度</div>
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background:#FFFCFA; border:1px solid var(--line); border-radius:14px; padding:6px;">
        <button class="icon-btn" id="chartPrevBtn" style="width:36px;height:36px;border:none;background:transparent;box-shadow:none;">&lt;</button>
        <div style="text-align:center;">
          <div id="chartPeriodLabel" style="font-weight:700; font-size:15px;">2026年 7月</div>
          <div id="chartPeriodSub" style="font-size:11px; color:var(--ink-soft); margin-top:2px;"></div>
        </div>
        <button class="icon-btn" id="chartNextBtn" style="width:36px;height:36px;border:none;background:transparent;box-shadow:none;">&gt;</button>
      </div>

      <div id="periodCompare" style="text-align:center; font-size:12px; font-weight:700; margin-bottom:14px;"></div>

      <canvas id="pieChart" height="220"></canvas>
      <div id="breakdownList" style="margin-top:16px;"></div>

      <div id="trendChartWrap" style="display:none; margin-top:22px; padding-top:18px; border-top:1px solid var(--line);">
        <h2 style="margin:0 0 12px; font-family:'Baloo 2',sans-serif; font-size:16px;">每月消費趨勢</h2>
        <canvas id="trendChart" height="180"></canvas>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-categories">
    <div class="add-card">
      <h2>新增分類</h2>
      <div class="field" style="margin-bottom:10px;">
        <label>名稱</label>
        <input type="text" id="newCatName" placeholder="例如：寵物、醫療…">
      </div>
      <label style="margin-bottom:6px; display:block;">顏色</label>
      <div class="color-swatches" id="newCatColors"></div>
      <button class="primary-btn" id="addCatBtn">＋ 新增分類</button>
    </div>
    <div id="categoryList" class="cat-grid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="quickAddModalOverlay">
  <div class="modal">
    <h3>記一筆消費</h3>
    <div class="field-row">
      <div class="field">
        <label>金額</label>
        <input type="number" id="fabAmountInput" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="fabDateInput">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>備註</label>
      <input type="text" id="fabNoteInput" placeholder="例如：午餐、捷運、網購…">
    </div>
    <label style="margin-bottom:8px; display:block;">分類</label>
    <div class="chip-row" id="fabCatPicker"></div>
    <div class="modal-actions">
      <button class="ghost-btn" id="fabCancelBtn">取消</button>
      <button class="primary-btn" id="fabAddExpenseBtn">＋ 加入紀錄</button>
    </div>
  </div>
</div>

<button id="quickAddFab" aria-label="快速記一筆" style="
  position:fixed; bottom:28px; right:24px;
  width:56px; height:56px; border-radius:50%; border:none;
  background:var(--ink); color:var(--cream); font-size:26px; font-weight:700;
  box-shadow:0 6px 18px rgba(74,46,61,.35); cursor:pointer; z-index:40;
  display:flex; align-items:center; justify-content:center;
">＋</button>

<div class="modal-overlay" id="editModalOverlay">
  <div class="modal">
    <h3>編輯這筆消費</h3>
    <div class="field-row">
      <div class="field">
        <label>金額</label>
        <input type="number" id="editAmount" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="editDate">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>備註</label>
      <input type="text" id="editNote">
    </div>
    <label style="margin-bottom:8px; display:block;">分類</label>
    <div class="chip-row" id="editCatPicker"></div>
    <div class="modal-actions">
      <button class="ghost-btn" id="editCancelBtn">取消</button>
      <button class="primary-btn" id="editSaveBtn">儲存變更</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="payModalOverlay">
  <div class="modal">
    <h3>登記已繳納金額</h3>
    <div class="hint" id="payModalHint"></div>
    <div class="field-row">
      <div class="field">
        <label>本次繳費金額</label>
        <input type="number" id="payAmount" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="payDate">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>備註（選填）</label>
      <input type="text" id="payNote" placeholder="例如：自動扣款、超商繳費…">
    </div>
    <div class="modal-actions">
      <button class="ghost-btn" id="payCancelBtn">取消</button>
      <button class="primary-btn" id="paySaveBtn">確認登記</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="colorPickModalOverlay">
  <div class="modal">
    <h3>選一個顏色</h3>
    <div class="color-swatches" id="colorPickSwatches" style="margin-bottom:4px;"></div>
    <div class="modal-actions">
      <button class="ghost-btn" id="colorPickCancelBtn">取消</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModalOverlay">
  <div class="modal">
    <h3>連接你的 Google 試算表</h3>
    <p style="font-size:12px; color:var(--ink-soft); line-height:1.6; margin:0 0 12px;">把 Apps Script 網址（結尾 /exec）跟通關密語填在下面。您也可以設定分析月份的起始日（例如帳單結帳日）。</p>
    
    <div class="field-row">
      <div class="field" style="margin-bottom:12px;">
        <label>月份起始日 (1~28)</label>
        <input type="number" id="startDayInput" placeholder="預設為 1" min="1" max="28">
      </div>
    </div>

    <div class="field" style="margin-bottom:12px;">
      <label>Web App 網址</label>
      <input type="text" id="webhookInput" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="field" style="margin-bottom:12px;">
      <label>通關密語</label>
      <input type="text" id="tokenInput" placeholder="跟 Code.gs 裡 ACCESS_TOKEN 一樣的字串">
    </div>
    <div class="status-line" id="connStatus"><span class="status-dot" style="background:#ccc;"></span>尚未連接</div>
    <div class="modal-actions">
      <button class="ghost-btn" id="settingsCancelBtn">關閉</button>
      <button class="primary-btn" id="settingsSaveBtn">儲存設定</button>
    </div>
  </div>
</div>

<script>
(function(){

  const CATEGORY_COLORS = ['#FF84BA','#99C2FF','#FFDF82','#C9A8FF','#8FE3C4','#FFB199','#F4A65B','#7FB2E5'];

  let state = {
    webhookUrl: localStorage.getItem('walletcard_webhook') || '',
    token: localStorage.getItem('walletcard_token') || '',
    startDay: parseInt(localStorage.getItem('walletcard_startDay')) || 1,
    expenses: [],
    categories: [],
    selectedCat: null,
    editingId: null,
    editSelectedCat: null,
    newCatColor: CATEGORY_COLORS[0]
  };

  let chartState = {
    mode: 'month', // 'month' or 'year'
    date: new Date()
  };

  let listState = {
    mode: 'month',
    date: new Date()
  };

  const $ = (id) => document.getElementById(id);

  function toast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove('show'), 2200);
  }
  function fmt(n){ return Math.round(n).toLocaleString('zh-TW'); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }

  function withLoading(btn, fn){
    if(btn.disabled) return Promise.resolve(null);
    const original = btn.textContent;
    btn.disabled = true;
    btn.dataset.loading = '1';
    btn.style.opacity = '.55';
    btn.textContent = '處理中…';
    return Promise.resolve(fn()).finally(() => {
      btn.disabled = false;
      delete btn.dataset.loading;
      btn.style.opacity = '';
      btn.textContent = original;
    });
  }

  async function apiGet(){
    if(!state.webhookUrl) return;
    try{
      const url = state.webhookUrl + (state.webhookUrl.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(state.token);
      const res = await fetch(url, { method:'GET' });
      const data = await res.json();
      if(data.error === 'unauthorized'){ setConn(false, true); toast('通關密語不對，請確認設定'); return; }
      applyData(data);
      setConn(true);
      renderAll();
    }catch(err){ setConn(false); toast('讀取失敗，請檢查網址或網路連線'); }
  }

  async function apiPost(action, data){
    if(!state.webhookUrl){ toast('請先在設定裡連接 Google 試算表'); return null; }
    try{
      const res = await fetch(state.webhookUrl, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, data, token: state.token })
      });
      const json = await res.json();
      if(json.error === 'unauthorized'){ setConn(false, true); toast('通關密語不對，請確認設定'); return null; }
      applyData(json);
      setConn(true);
      renderAll();
      return json.result;
    }catch(err){ setConn(false); toast('同步失敗，請檢查網路連線'); return null; }
  }

  let draggingCatId = null;

  function startCategoryDrag(catId, cardEl, clientX, clientY){
    draggingCatId = catId;
    const rect = cardEl.getBoundingClientRect();
    const ghost = cardEl.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.position = 'fixed';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    ghost.style.width = rect.width + 'px';
    ghost.style.zIndex = 200;
    ghost.style.pointerEvents = 'none';
    document.body.appendChild(ghost);
    renderCategories();

    const offsetX = clientX - rect.left;
    const offsetY = clientY - rect.top;

    function onMove(e){
      const cx = e.clientX, cy = e.clientY;
      ghost.style.left = (cx - offsetX) + 'px';
      ghost.style.top = (cy - offsetY) + 'px';
      ghost.style.visibility = 'hidden';
      const el = document.elementFromPoint(cx, cy);
      ghost.style.visibility = '';
      const overCard = el && el.closest('.manage-card');
      if(overCard && overCard.dataset.catid !== draggingCatId){
        const ids = state.categories.map(c => c.id);
        const fromIdx = ids.indexOf(draggingCatId);
        const toIdx = ids.indexOf(overCard.dataset.catid);
        if(fromIdx !== -1 && toIdx !== -1){
          const reordered = [...state.categories];
          const [moved] = reordered.splice(fromIdx, 1);
          reordered.splice(toIdx, 0, moved);
          state.categories = reordered;
          renderCategories();
        }
      }
    }

    function onUp(){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      ghost.remove();
      draggingCatId = null;
      renderCategories();
      apiPost('reorderCategories', { order: state.categories.map(c => c.id) });
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  /* --- 圖表與紀錄共用的區間邏輯 --- */
  function formatD(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function getPeriodRange(mode, date, startDay){
    const y = date.getFullYear();
    const m = date.getMonth();
    let dStart, dEnd, labelStr, subStr;
    if (mode === 'year') {
      dStart = new Date(y, 0, 1);
      dEnd = new Date(y, 11, 31);
      labelStr = `${y} 年度`;
      subStr = `${y}-01-01 ~ ${y}-12-31`;
    } else {
      const sd = Math.min(startDay, 28);
      dStart = new Date(y, m, sd);
      dEnd = new Date(y, m + 1, sd);
      dEnd.setDate(dEnd.getDate() - 1);
      labelStr = `${y}年 ${m + 1}月`;
      subStr = `${formatD(dStart)} ~ ${formatD(dEnd)}`;
    }
    return { dStart, dEnd, labelStr, subStr };
  }

  function renderPeriodCompare(curTotal, prevTotal){
    const el = $('periodCompare');
    if(prevTotal === 0){
      el.innerHTML = curTotal === 0 ? '' : '<span style="color:var(--danger)">▲ 上期無消費，本期共 NT$'+fmt(curTotal)+'</span>';
      return;
    }
    const diff = curTotal - prevTotal;
    if(diff === 0){ el.innerHTML = '<span style="color:var(--ink-soft)">與上期持平</span>'; return; }
    const pct = Math.round(Math.abs(diff)/prevTotal*100);
    const up = diff > 0;
    const color = up ? 'var(--danger)' : '#4C9A6A';
    const arrow = up ? '▲' : '▼';
    el.innerHTML = '<span style="color:'+color+'">'+arrow+' 較上期'+(up?'增加':'減少')+' '+pct+'%（NT$'+fmt(Math.abs(diff))+'）</span>';
  }

  function renderTrendChart(year){
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const monthTotals = new Array(12).fill(0);
    state.expenses.forEach(e => {
      if(e.type !== 'expense') return;
      const parts = e.date.split('-');
      if(Number(parts[0]) === year) monthTotals[Number(parts[1]) - 1] += Number(e.amount);
    });
    const ctx = document.getElementById('trendChart');
    if(trendChartInstance) trendChartInstance.destroy();
    trendChartInstance = new Chart(ctx, {
      type: 'bar',
      data: { labels: monthNames, datasets: [{ data: monthTotals, backgroundColor: '#99C2FF', borderRadius: 6, maxBarThickness: 22 }] },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display:false }, ticks: { color:'#8A6E7D', font:{ size:10 } } },
          y: { grid: { color:'#F1E0D6' }, ticks: { color:'#8A6E7D', font:{ size:10 } } }
        }
      }
    });
  }

  function renderChart(){
    const { dStart, dEnd, labelStr, subStr } = getPeriodRange(chartState.mode, chartState.date, state.startDay);
    $('chartPeriodLabel').textContent = labelStr;
    $('chartPeriodSub').textContent = subStr;

    const startStr = formatD(dStart);
    const endStr = formatD(dEnd);

    const rows = state.expenses.filter(e => e.type === 'expense' && e.date >= startStr && e.date <= endStr);

    if(chartState.mode === 'month'){
      const prevDate = new Date(chartState.date);
      prevDate.setMonth(prevDate.getMonth() - 1);
      const prevRange = getPeriodRange('month', prevDate, state.startDay);
      const prevStart = formatD(prevRange.dStart), prevEnd = formatD(prevRange.dEnd);
      const prevTotal = state.expenses
        .filter(e => e.type === 'expense' && e.date >= prevStart && e.date <= prevEnd)
        .reduce((s,e)=> s + Number(e.amount), 0);
      const curTotal = rows.reduce((s,e)=> s + Number(e.amount), 0);
      renderPeriodCompare(curTotal, prevTotal);
    } else {
      $('periodCompare').innerHTML = '';
    }

    if(chartState.mode === 'year'){
      $('trendChartWrap').style.display = '';
      renderTrendChart(chartState.date.getFullYear());
    } else {
      $('trendChartWrap').style.display = 'none';
    }
    
    const byCat = {};
    rows.forEach(e => { byCat[e.categoryId] = (byCat[e.categoryId]||0) + Number(e.amount); });
    const catIds = Object.keys(byCat).sort((a,b)=> byCat[b]-byCat[a]);
    const labels = catIds.map(id => categoryById(id).name);
    const colors = catIds.map(id => categoryById(id).color);
    const values = catIds.map(id => byCat[id]);

    const ctx = document.getElementById('pieChart');
    if(chartInstance) chartInstance.destroy();

    if(values.length === 0){
      $('breakdownList').innerHTML = '<div class="empty-state"><div class="emoji">📊</div><p>這個區間內沒有消費紀錄</p></div>';
      return;
    }
    const total = values.reduce((a,b)=>a+b,0);
    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderColor:'#FFF7ED', borderWidth: 3 }] },
      options: { cutout: '62%', plugins: { legend: { display: false } } },
      plugins: [{
        id: 'centerText',
        afterDraw(chart){
          const { ctx, chartArea:{left,right,top,bottom} } = chart;
          const cx = (left+right)/2, cy = (top+bottom)/2;
          ctx.save();
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = "700 22px 'JetBrains Mono', monospace";
          ctx.fillStyle = '#4A2E3D';
          ctx.fillText('NT$'+fmt(total), cx, cy - 9);
          ctx.font = "600 11px 'Inter', sans-serif";
          ctx.fillStyle = '#8A6E7D';
          ctx.fillText('區間消費加總', cx, cy + 14);
          ctx.restore();
        }
      }]
    });
    $('breakdownList').innerHTML = catIds.map((id,i) => (
      '<div class="breakdown-row">'
      + '<span class="dot" style="background:'+colors[i]+'"></span>'
      + '<span class="name">'+labels[i]+'</span>'
      + '<span class="amt">NT$'+fmt(values[i])+' · '+Math.round(values[i]/total*100)+'%</span>'
      + '</div>'
    )).join('');
  }

  }
  initColorSwatches('newCatColors', CATEGORY_COLORS, ()=>state.newCatColor, (c)=>state.newCatColor=c);

  $('addCatBtn').onclick = () => {
    const name = $('newCatName').value.trim();
    if(!name){ toast('請輸入分類名稱'); return; }
    apiPost('addCategory', { name, color: state.newCatColor }).then(res => { if(res){ $('newCatName').value=''; toast('已新增分類'); } });
  };

  $('settingsBtn').onclick = () => {
    $('webhookInput').value = state.webhookUrl;
    $('tokenInput').value = state.token;
    $('startDayInput').value = state.startDay;
    setConn(!!state.webhookUrl);
    $('settingsModalOverlay').classList.add('show');
  };
  
  $('settingsCancelBtn').onclick = () => $('settingsModalOverlay').classList.remove('show');
  
  $('settingsSaveBtn').onclick = () => {
    const url = $('webhookInput').value.trim();
    const token = $('tokenInput').value.trim();
    const sDay = parseInt($('startDayInput').value);
    
    if(!url){ toast('請貼上 Web App 網址'); return; }
    if(!token){ toast('請填入通關密語'); return; }
    if(sDay < 1 || sDay > 28 || isNaN(sDay)){ toast('起始日請設定在 1 到 28 之間'); return; }

    state.webhookUrl = url; 
    state.token = token;
    state.startDay = sDay;

    localStorage.setItem('walletcard_webhook', url);
    localStorage.setItem('walletcard_token', token);
    localStorage.setItem('walletcard_startDay', sDay);
    
    renderChart();
    renderList();
    apiGet().then(()=> { toast('已儲存設定'); $('settingsModalOverlay').classList.remove('show'); });
  };

  [ $('editModalOverlay'), $('payModalOverlay'), $('settingsModalOverlay'), $('colorPickModalOverlay'), $('quickAddModalOverlay') ].forEach(ov => {
    ov.addEventListener('click', (e) => { if(e.target === ov) ov.classList.remove('show'); });
  });

  if(state.webhookUrl){ apiGet(); }
  else { renderAll(); setTimeout(()=> $('settingsBtn').click(), 400); }

})();
</script>
</body>
</html>
