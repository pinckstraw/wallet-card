<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>錢包色卡 · 消費紀錄器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --pink:#FF84BA;
    --pink-deep:#E85A9B;
    --yellow:#FFDF82;
    --yellow-deep:#E0B93F;
    --blue:#99C2FF;
    --blue-deep:#5B8FE0;
    --cream:#FFEFE3;
    --bg:#FFF7ED;
    --card:#FFFFFF;
    --ink:#4A2E3D;
    --ink-soft:#8A6E7D;
    --line:#F1E0D6;
    --danger:#E85A5A;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    padding:20px 18px 100px;
    position:relative;
  }
  .top-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .brand{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:-0.3px;
  }
  .brand span{color:var(--pink-deep);}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:17px; cursor:pointer; color:var(--ink);
  }

  .overview-pill{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--ink); color:var(--cream); border-radius:20px;
    padding:12px 18px; margin-bottom:16px;
  }
  .overview-pill .label{font-size:12px; color:#E9C9D8; font-weight:600;}
  .overview-pill .value{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:19px;}

  /* Card hero blocks (one per credit card) */
  .card-hero{
    border-radius:var(--radius-lg);
    padding:20px 20px 18px;
    color:var(--ink);
    margin-bottom:14px;
    position:relative;
  }
  .card-hero .ch-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .card-hero .ch-name{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px;}
  .card-hero .ch-tag{font-size:11px; font-weight:600; opacity:.65; margin-top:2px;}
  .card-hero .ch-amount{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:32px; margin-top:10px; line-height:1;
  }
  .card-hero .ch-amount small{font-size:15px; font-weight:600; opacity:.7; margin-right:2px;}
  .card-hero .ch-sub{font-size:11px; opacity:.65; margin-top:6px;}
  .pay-btn{
    margin-top:14px; border:none; border-radius:14px;
    background:rgba(74,46,61,0.14); color:var(--ink); font-family:'Baloo 2',sans-serif;
    font-weight:700; font-size:13px; padding:10px 16px; cursor:pointer;
  }
  .pay-btn:active{transform:scale(.97);}

  /* Quick add card */
  .add-card{
    background:var(--card); border-radius:var(--radius-lg);
    padding:18px; margin-bottom:16px; border:1px solid var(--line);
  }
  .add-card h2{
    font-family:'Baloo 2',sans-serif; font-size:16px; margin:0 0 12px;
  }
  .field-row{display:flex; gap:10px; margin-bottom:10px;}
  .field{flex:1; display:flex; flex-direction:column; gap:5px;}
  label{font-size:11px; font-weight:600; color:var(--ink-soft);}
  input[type=number], input[type=text], input[type=date], select{
    border:1.5px solid var(--line); border-radius:var(--radius-sm);
    padding:10px 12px; font-size:15px; font-family:'Inter',sans-serif;
    background:#FFFCFA; color:var(--ink); width:100%;
  }
  input:focus, select:focus{outline:2px solid var(--blue); border-color:var(--blue);}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .chip{
    padding:7px 13px; border-radius:20px; font-size:13px; font-weight:600;
    border:1.5px solid var(--line); background:#fff; cursor:pointer; color:var(--ink-soft);
  }
  .chip.active{border-color:transparent; color:var(--ink);}
  .primary-btn{
    width:100%; border:none; border-radius:var(--radius-md);
    background:var(--ink); color:var(--cream); font-family:'Baloo 2',sans-serif;
    font-weight:700; font-size:15px; padding:13px; cursor:pointer;
  }
  .primary-btn:active{transform:scale(.98);}

  /* Tabs */
  .tabs{display:flex; gap:5px; margin-bottom:14px; background:var(--card); padding:5px; border-radius:16px; border:1px solid var(--line);}
  .tab{
    flex:1; text-align:center; padding:9px 2px; border-radius:12px; font-size:13px;
    font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .tab.active{background:var(--yellow); color:var(--ink);}

  .panel{display:none;}
  .panel.active{display:block;}

  /* Expense list */
  .list-item{
    background:var(--card); border-radius:var(--radius-md); padding:14px 14px;
    display:flex; align-items:center; gap:12px; margin-bottom:10px; border:1px solid var(--line);
  }
  .cat-dot{width:38px;height:38px;border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:var(--ink);}
  .li-main{flex:1; min-width:0;}
  .li-cat{font-size:12px; font-weight:600; color:var(--ink-soft); display:flex; gap:6px; align-items:center;}
  .li-card-badge{font-size:10px; font-weight:700; padding:1px 7px; border-radius:8px; background:var(--cream); color:var(--ink);}
  .li-note{font-size:14px; font-weight:500; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .li-date{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .li-amount{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; white-space:nowrap;}
  .li-amount.payment{color:#4C9A6A;}
  .li-actions{display:flex; gap:6px;}
  .li-actions button{
    border:none; background:var(--cream); width:28px; height:28px; border-radius:8px;
    font-size:13px; cursor:pointer; color:var(--ink);
  }
  .empty-state{
    text-align:center; padding:40px 20px; color:var(--ink-soft);
  }
  .empty-state .emoji{font-size:32px; margin-bottom:8px;}
  .empty-state p{font-size:13px; margin:4px 0 0; line-height:1.6;}

  /* Manage rows (categories & cards) */
  .manage-row{
    background:var(--card); border-radius:var(--radius-md); padding:12px 14px;
    display:flex; align-items:center; gap:12px; margin-bottom:8px; border:1px solid var(--line);
  }
  .color-dot-lg{width:28px;height:28px;border-radius:50%; flex-shrink:0; border:2px solid #fff; box-shadow:0 0 0 1.5px var(--line);}
  .manage-row input[type=text]{border:none; background:transparent; font-weight:600; font-size:14px; padding:2px 0;}
  .color-swatches{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 12px;}
  .color-swatches div{width:24px;height:24px;border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .color-swatches div.selected{border-color:var(--ink);}

  /* Chart panel */
  .chart-card{
    background:var(--card); border-radius:var(--radius-lg); padding:20px; border:1px solid var(--line); margin-bottom:16px;
  }
  .chart-card h2{font-family:'Baloo 2',sans-serif; font-size:16px; margin:0 0 10px;}
  .breakdown-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .breakdown-row:last-child{border-bottom:none;}
  .breakdown-row .dot{width:10px;height:10px;border-radius:50%;}
  .breakdown-row .name{flex:1; font-weight:600;}
  .breakdown-row .amt{font-family:'JetBrains Mono',monospace; font-weight:600;}

  .status-dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:6px;}
  .status-line{font-size:12px; color:var(--ink-soft); display:flex; align-items:center; margin-top:10px;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--cream); padding:11px 20px; border-radius:20px;
    font-size:13px; font-weight:600; z-index:50; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; max-width:90%; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(74,46,61,.45); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--bg); width:100%; max-width:480px; border-radius:24px 24px 0 0;
    padding:22px 20px 28px; max-height:85vh; overflow-y:auto;
  }
  .modal h3{font-family:'Baloo 2',sans-serif; margin:0 0 14px; font-size:17px;}
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions button{flex:1;}
  .ghost-btn{
    border:1.5px solid var(--line); background:#fff; border-radius:var(--radius-md);
    padding:13px; font-weight:700; font-family:'Baloo 2',sans-serif; font-size:14px; cursor:pointer; color:var(--ink-soft);
  }
  .hint{font-size:12px; color:var(--ink-soft); margin:-6px 0 12px;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div id="app">

  <div class="top-bar">
    <div class="brand">錢包<span>色卡</span></div>
    <div class="icon-btn" id="settingsBtn">⚙</div>
  </div>

  <div class="overview-pill">
    <span class="label">全部卡片合計未繳</span>
    <span class="value" id="overviewTotal">NT$0</span>
  </div>

  <!-- one hero block per card, rendered by JS -->
  <div id="cardHeroList"></div>

  <!-- Quick add -->
  <div class="add-card">
    <h2>記一筆消費</h2>
    <div class="field-row">
      <div class="field">
        <label>金額</label>
        <input type="number" id="amountInput" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="dateInput">
      </div>
    </div>
    <div class="field" style="margin-bottom:12px;">
      <label>備註</label>
      <input type="text" id="noteInput" placeholder="例如：午餐、捷運、網購…">
    </div>
    <label style="margin-bottom:8px; display:block;">刷哪張卡</label>
    <div class="chip-row" id="cardPicker"></div>
    <label style="margin-bottom:8px; display:block;">分類</label>
    <div class="chip-row" id="catPicker"></div>
    <button class="primary-btn" id="addExpenseBtn">＋ 加入紀錄</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="list">紀錄</div>
    <div class="tab" data-tab="chart">分析</div>
    <div class="tab" data-tab="categories">分類</div>
    <div class="tab" data-tab="cards">卡片</div>
  </div>

  <div class="panel active" id="panel-list"></div>

  <div class="panel" id="panel-chart">
    <div class="chart-card">
      <h2>分類佔比</h2>
      <div class="chip-row" id="chartCardFilter" style="margin-bottom:14px;"></div>
      <canvas id="pieChart" height="220"></canvas>
      <div id="breakdownList" style="margin-top:16px;"></div>
    </div>
  </div>

  <div class="panel" id="panel-categories">
    <div class="add-card">
      <h2>新增分類</h2>
      <div class="field" style="margin-bottom:10px;">
        <label>名稱</label>
        <input type="text" id="newCatName" placeholder="例如：寵物、醫療…">
      </div>
      <label style="margin-bottom:6px; display:block;">顏色</label>
      <div class="color-swatches" id="newCatColors"></div>
      <button class="primary-btn" id="addCatBtn">＋ 新增分類</button>
    </div>
    <div id="categoryList"></div>
  </div>

  <div class="panel" id="panel-cards">
    <div class="add-card">
      <h2>新增卡片</h2>
      <div class="field" style="margin-bottom:10px;">
        <label>卡片名稱</label>
        <input type="text" id="newCardName" placeholder="例如：國泰CUBE、玉山Ubear…">
      </div>
      <label style="margin-bottom:6px; display:block;">顏色</label>
      <div class="color-swatches" id="newCardColors"></div>
      <button class="primary-btn" id="addCardBtn">＋ 新增卡片</button>
    </div>
    <div id="cardManageList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Edit expense modal -->
<div class="modal-overlay" id="editModalOverlay">
  <div class="modal">
    <h3>編輯這筆消費</h3>
    <div class="field-row">
      <div class="field">
        <label>金額</label>
        <input type="number" id="editAmount" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="editDate">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>備註</label>
      <input type="text" id="editNote">
    </div>
    <label style="margin-bottom:8px; display:block;">刷哪張卡</label>
    <div class="chip-row" id="editCardPicker"></div>
    <label style="margin-bottom:8px; display:block;">分類</label>
    <div class="chip-row" id="editCatPicker"></div>
    <div class="modal-actions">
      <button class="ghost-btn" id="editCancelBtn">取消</button>
      <button class="primary-btn" id="editSaveBtn">儲存變更</button>
    </div>
  </div>
</div>

<!-- Payment modal -->
<div class="modal-overlay" id="payModalOverlay">
  <div class="modal">
    <h3 id="payModalTitle">登記已繳金額</h3>
    <div class="hint" id="payModalHint"></div>
    <div class="field-row">
      <div class="field">
        <label>本次繳費金額</label>
        <input type="number" id="payAmount" placeholder="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="payDate">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>備註（選填）</label>
      <input type="text" id="payNote" placeholder="例如：自動扣款、超商繳費…">
    </div>
    <div class="modal-actions">
      <button class="ghost-btn" id="payCancelBtn">取消</button>
      <button class="primary-btn" id="paySaveBtn">確認登記</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModalOverlay">
  <div class="modal">
    <h3>連接你的 Google 試算表</h3>
    <p style="font-size:12px; color:var(--ink-soft); line-height:1.6; margin:0 0 12px;">把 Apps Script 網址（結尾 /exec）跟通關密語填在下面，只需要設定一次，之後會存在這台裝置的瀏覽器裡。</p>
    <div class="field" style="margin-bottom:12px;">
      <label>Web App 網址</label>
      <input type="text" id="webhookInput" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="field" style="margin-bottom:12px;">
      <label>通關密語</label>
      <input type="text" id="tokenInput" placeholder="跟 Code.gs 裡 ACCESS_TOKEN 一樣的字串">
    </div>
    <div class="status-line" id="connStatus"><span class="status-dot" style="background:#ccc;"></span>尚未連接</div>
    <div class="modal-actions">
      <button class="ghost-btn" id="settingsCancelBtn">關閉</button>
      <button class="primary-btn" id="settingsSaveBtn">儲存並同步</button>
    </div>
  </div>
</div>

<script>
(function(){

  const PALETTE_ROTATION = ['#FF84BA', '#FFDF82', '#99C2FF', '#FFEFE3', '#C9A8FF', '#8FE3C4'];
  const CATEGORY_COLORS = ['#FF84BA','#99C2FF','#FFDF82','#C9A8FF','#8FE3C4','#FFB199','#F4A65B','#7FB2E5'];

  let state = {
    webhookUrl: localStorage.getItem('walletcard_webhook') || '',
    token: localStorage.getItem('walletcard_token') || '',
    expenses: [],
    categories: [],
    cards: [],
    selectedCat: null,
    selectedCard: null,
    editingId: null,
    editSelectedCat: null,
    editSelectedCard: null,
    newCatColor: CATEGORY_COLORS[0],
    newCardColor: PALETTE_ROTATION[0],
    payingCardId: null,
    chartCardFilter: 'all'
  };

  const $ = (id) => document.getElementById(id);

  function toast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove('show'), 2200);
  }
  function fmt(n){ return Math.round(n).toLocaleString('zh-TW'); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }

  // ---------- Networking ----------
  async function apiGet(){
    if(!state.webhookUrl) return;
    try{
      const url = state.webhookUrl + (state.webhookUrl.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(state.token);
      const res = await fetch(url, { method:'GET' });
      const data = await res.json();
      if(data.error === 'unauthorized'){ setConn(false, true); toast('通關密語不對，請確認設定'); return; }
      applyData(data);
      setConn(true);
      renderAll();
    }catch(err){ setConn(false); toast('讀取失敗，請檢查網址或網路連線'); }
  }

  async function apiPost(action, data){
    if(!state.webhookUrl){ toast('請先在設定裡連接 Google 試算表'); return null; }
    try{
      const res = await fetch(state.webhookUrl, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, data, token: state.token })
      });
      const json = await res.json();
      if(json.error === 'unauthorized'){ setConn(false, true); toast('通關密語不對，請確認設定'); return null; }
      applyData(json);
      setConn(true);
      renderAll();
      return json.result;
    }catch(err){ setConn(false); toast('同步失敗，請檢查網路連線'); return null; }
  }

  function applyData(data){
    state.expenses = data.expenses || state.expenses;
    state.categories = data.categories || state.categories;
    state.cards = data.cards || state.cards;
    if(!state.selectedCard && state.cards.length) state.selectedCard = state.cards[0].id;
    if(!state.editSelectedCard && state.cards.length) state.editSelectedCard = state.cards[0].id;
  }

  function setConn(ok, unauthorized){
    const el = $('connStatus');
    if(!state.webhookUrl){ el.innerHTML = '<span class="status-dot" style="background:#ccc;"></span>尚未連接'; return; }
    if(unauthorized){ el.innerHTML = '<span class="status-dot" style="background:#E85A5A;"></span>通關密語不對'; return; }
    el.innerHTML = ok
      ? '<span class="status-dot" style="background:#4C9A6A;"></span>已連接，資料同步中'
      : '<span class="status-dot" style="background:#E85A5A;"></span>連線失敗';
  }

  // ---------- Helpers ----------
  function categoryById(id){ return state.categories.find(c => c.id === id) || { name:'未分類', color:'#ccc' }; }
  function cardById(id){ return state.cards.find(c => c.id === id) || { id:'', name:'未指定卡片', color:'#D9D2CE' }; }

  function cardBalance(cardId){
    let bal = 0;
    state.expenses.forEach(e => {
      if(e.cardId !== cardId) return;
      bal += e.type === 'payment' ? -Number(e.amount) : Number(e.amount);
    });
    return bal;
  }

  function lastPaymentDate(cardId){
    const p = state.expenses.filter(e => e.type === 'payment' && e.cardId === cardId);
    if(p.length === 0) return null;
    return p.reduce((a,b)=> (a.createdAt||a.date) > (b.createdAt||b.date) ? a : b).date;
  }

  // "unpaid" expenses for analysis = all expense-type rows minus, per card, whatever's been paid off is
  // conceptually already folded into the running balance; for the pie chart we approximate unpaid
  // composition using all expense rows not yet exceeded by cumulative payments (simple & good enough
  // for everyday use): here we just use all expense-type rows for the selected scope, since balances
  // are running totals rather than tied to specific expense rows.
  function scopedExpenseRows(cardFilter){
    return state.expenses.filter(e => e.type === 'expense' && (cardFilter === 'all' || e.cardId === cardFilter));
  }

  // ---------- Rendering ----------
  function renderAll(){
    renderOverview();
    renderCardHeroes();
    renderPickers();
    renderList();
    renderCategories();
    renderCards();
    renderChartFilter();
    renderChart();
  }

  function renderOverview(){
    const total = state.cards.reduce((s,c)=> s + Math.max(cardBalance(c.id),0), 0);
    $('overviewTotal').textContent = 'NT$' + fmt(total);
  }

  function renderCardHeroes(){
    const el = $('cardHeroList');
    if(state.cards.length === 0){
      el.innerHTML = '<div class="empty-state"><div class="emoji">💳</div><p>還沒有任何卡片<br>先到下面「卡片」分頁新增一張吧</p></div>';
      return;
    }
    el.innerHTML = state.cards.map((c,i) => {
      const bal = cardBalance(c.id);
      const last = lastPaymentDate(c.id);
      const bgColor = c.color || PALETTE_ROTATION[i % PALETTE_ROTATION.length];
      return '<div class="card-hero" style="background:'+bgColor+';">'
        + '<div class="ch-top">'
          + '<div><div class="ch-name">'+c.name+'</div><div class="ch-tag">目前未繳金額</div></div>'
        + '</div>'
        + '<div class="ch-amount"><small>NT$</small>'+fmt(Math.max(bal,0))+'</div>'
        + '<div class="ch-sub">'+(last ? '上次繳費：'+last : '尚未有繳費紀錄')+'</div>'
        + '<button class="pay-btn" data-pay="'+c.id+'">登記已繳金額</button>'
      + '</div>';
    }).join('');
    el.querySelectorAll('[data-pay]').forEach(btn => btn.onclick = () => openPayModal(btn.dataset.pay));
  }

  function renderPickers(){
    ['catPicker','editCatPicker'].forEach(pid => {
      const el = $(pid); el.innerHTML = '';
      state.categories.forEach(cat => {
        const isEdit = pid === 'editCatPicker';
        const sel = isEdit ? state.editSelectedCat : state.selectedCat;
        const chip = document.createElement('div');
        chip.className = 'chip' + (sel === cat.id ? ' active' : '');
        if(sel === cat.id) chip.style.background = cat.color;
        chip.textContent = cat.name;
        chip.onclick = () => { if(isEdit) state.editSelectedCat = cat.id; else state.selectedCat = cat.id; renderPickers(); };
        el.appendChild(chip);
      });
    });
    ['cardPicker','editCardPicker'].forEach(pid => {
      const el = $(pid); el.innerHTML = '';
      state.cards.forEach(c => {
        const isEdit = pid === 'editCardPicker';
        const sel = isEdit ? state.editSelectedCard : state.selectedCard;
        const chip = document.createElement('div');
        chip.className = 'chip' + (sel === c.id ? ' active' : '');
        if(sel === c.id) chip.style.background = c.color;
        chip.textContent = c.name;
        chip.onclick = () => { if(isEdit) state.editSelectedCard = c.id; else state.selectedCard = c.id; renderPickers(); };
        el.appendChild(chip);
      });
    });
  }

  function renderList(){
    const el = $('panel-list');
    const items = [...state.expenses].sort((a,b)=> (b.createdAt||b.date).localeCompare(a.createdAt||a.date));
    if(items.length === 0){
      el.innerHTML = '<div class="empty-state"><div class="emoji">🧾</div><p>還沒有任何消費紀錄<br>用上面的表單記下第一筆吧</p></div>';
      return;
    }
    el.innerHTML = items.map(e => {
      const card = cardById(e.cardId);
      if(e.type === 'payment'){
        return '<div class="list-item">'
          + '<div class="cat-dot" style="background:#DDEFE0;">✓</div>'
          + '<div class="li-main"><div class="li-cat">繳費結清 <span class="li-card-badge">'+card.name+'</span></div>'
          + (e.note ? '<div class="li-note">'+e.note+'</div>' : '')
          + '<div class="li-date">'+e.date+'</div></div>'
          + '<div class="li-amount payment">-NT$'+fmt(e.amount)+'</div>'
          + '<div class="li-actions"><button data-del="'+e.id+'">✕</button></div>'
          + '</div>';
      }
      const cat = categoryById(e.categoryId);
      return '<div class="list-item">'
        + '<div class="cat-dot" style="background:'+cat.color+'55;">'+cat.name.slice(0,1)+'</div>'
        + '<div class="li-main">'
          + '<div class="li-cat">'+cat.name+' <span class="li-card-badge">'+card.name+'</span></div>'
          + '<div class="li-note">'+(e.note || '（無備註）')+'</div>'
          + '<div class="li-date">'+e.date+'</div>'
        + '</div>'
        + '<div class="li-amount">NT$'+fmt(e.amount)+'</div>'
        + '<div class="li-actions">'
          + '<button data-edit="'+e.id+'">✎</button>'
          + '<button data-del="'+e.id+'">✕</button>'
        + '</div>'
      + '</div>';
    }).join('');
    el.querySelectorAll('[data-edit]').forEach(btn => btn.onclick = () => openEdit(btn.dataset.edit));
    el.querySelectorAll('[data-del]').forEach(btn => btn.onclick = () => deleteExpense(btn.dataset.del));
  }

  function renderCategories(){
    const el = $('categoryList');
    el.innerHTML = state.categories.map(cat => (
      '<div class="manage-row">'
      + '<div class="color-dot-lg" style="background:'+cat.color+'"></div>'
      + '<input type="text" value="'+cat.name+'" data-name="'+cat.id+'">'
      + '<button data-delcat="'+cat.id+'" style="border:none;background:transparent;color:var(--ink-soft);font-size:15px;cursor:pointer;">✕</button>'
      + '</div>'
    )).join('');
    el.querySelectorAll('[data-name]').forEach(inp => inp.onchange = () => {
      const cat = categoryById(inp.dataset.name);
      apiPost('updateCategory', { id: inp.dataset.name, name: inp.value, color: cat.color });
    });
    el.querySelectorAll('[data-delcat]').forEach(btn => btn.onclick = () => {
      if(confirm('刪除這個分類？已使用這個分類的紀錄會保留，但會顯示為未分類。')){
        apiPost('deleteCategory', { id: btn.dataset.delcat }).then(()=> toast('分類已刪除'));
      }
    });
  }

  function renderCards(){
    const el = $('cardManageList');
    el.innerHTML = state.cards.map(c => (
      '<div class="manage-row">'
      + '<div class="color-dot-lg" style="background:'+c.color+'"></div>'
      + '<input type="text" value="'+c.name+'" data-cardname="'+c.id+'">'
      + '<button data-delcard="'+c.id+'" style="border:none;background:transparent;color:var(--ink-soft);font-size:15px;cursor:pointer;">✕</button>'
      + '</div>'
    )).join('');
    el.querySelectorAll('[data-cardname]').forEach(inp => inp.onchange = () => {
      const c = cardById(inp.dataset.cardname);
      apiPost('updateCard', { id: inp.dataset.cardname, name: inp.value, color: c.color });
    });
    el.querySelectorAll('[data-delcard]').forEach(btn => btn.onclick = () => {
      if(confirm('刪除這張卡片？已使用這張卡的紀錄會保留，但會顯示為未指定卡片。')){
        apiPost('deleteCard', { id: btn.dataset.delcard }).then(()=> toast('卡片已刪除'));
      }
    });
  }

  function renderChartFilter(){
    const el = $('chartCardFilter');
    const options = [{id:'all', name:'全部卡片'}].concat(state.cards);
    el.innerHTML = '';
    options.forEach(o => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (state.chartCardFilter === o.id ? ' active' : '');
      if(state.chartCardFilter === o.id) chip.style.background = o.color || 'var(--yellow)';
      chip.textContent = o.name;
      chip.onclick = () => { state.chartCardFilter = o.id; renderChartFilter(); renderChart(); };
      el.appendChild(chip);
    });
  }

  let chartInstance = null;
  function renderChart(){
    const rows = scopedExpenseRows(state.chartCardFilter);
    const byCat = {};
    rows.forEach(e => { byCat[e.categoryId] = (byCat[e.categoryId]||0) + Number(e.amount); });
    const catIds = Object.keys(byCat).sort((a,b)=> byCat[b]-byCat[a]);
    const labels = catIds.map(id => categoryById(id).name);
    const colors = catIds.map(id => categoryById(id).color);
    const values = catIds.map(id => byCat[id]);

    const ctx = document.getElementById('pieChart');
    if(chartInstance) chartInstance.destroy();

    if(values.length === 0){
      $('breakdownList').innerHTML = '<div class="empty-state"><div class="emoji">📊</div><p>這個範圍目前沒有消費紀錄</p></div>';
      return;
    }
    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderColor:'#FFF7ED', borderWidth: 3 }] },
      options: { cutout: '62%', plugins: { legend: { display: false } } }
    });
    const total = values.reduce((a,b)=>a+b,0);
    $('breakdownList').innerHTML = catIds.map((id,i) => (
      '<div class="breakdown-row">'
      + '<span class="dot" style="background:'+colors[i]+'"></span>'
      + '<span class="name">'+labels[i]+'</span>'
      + '<span class="amt">NT$'+fmt(values[i])+' · '+Math.round(values[i]/total*100)+'%</span>'
      + '</div>'
    )).join('');
  }

  // ---------- Actions ----------
  function openEdit(id){
    const e = state.expenses.find(x => x.id === id);
    if(!e) return;
    state.editingId = id;
    state.editSelectedCat = e.categoryId;
    state.editSelectedCard = e.cardId;
    $('editAmount').value = e.amount;
    $('editDate').value = e.date;
    $('editNote').value = e.note || '';
    renderPickers();
    $('editModalOverlay').classList.add('show');
  }

  function deleteExpense(id){
    if(confirm('刪除這筆紀錄？')){ apiPost('deleteExpense', { id }).then(()=> toast('已刪除')); }
  }

  function openPayModal(cardId){
    state.payingCardId = cardId;
    const c = cardById(cardId);
    const bal = cardBalance(cardId);
    $('payModalTitle').textContent = '登記已繳金額 · ' + c.name;
    $('payModalHint').textContent = '目前未繳約 NT$' + fmt(Math.max(bal,0)) + '，可以只填部分金額';
    $('payAmount').value = '';
    $('payDate').value = todayStr();
    $('payNote').value = '';
    $('payModalOverlay').classList.add('show');
  }

  // ---------- Init events ----------
  $('dateInput').value = todayStr();

  $('addExpenseBtn').onclick = () => {
    const amount = parseFloat($('amountInput').value);
    if(!amount || amount <= 0){ toast('請輸入正確的金額'); return; }
    if(!state.selectedCard){ toast('請選擇刷哪張卡'); return; }
    if(!state.selectedCat){ toast('請選擇一個分類'); return; }
    apiPost('addExpense', {
      amount, date: $('dateInput').value, note: $('noteInput').value,
      categoryId: state.selectedCat, cardId: state.selectedCard, type: 'expense'
    }).then(res => {
      if(res){ $('amountInput').value=''; $('noteInput').value=''; $('dateInput').value = todayStr(); toast('已加入紀錄'); }
    });
  };

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      $('panel-'+tab.dataset.tab).classList.add('active');
    };
  });

  $('editCancelBtn').onclick = () => $('editModalOverlay').classList.remove('show');
  $('editSaveBtn').onclick = () => {
    const amount = parseFloat($('editAmount').value);
    if(!amount || amount <= 0){ toast('請輸入正確的金額'); return; }
    apiPost('updateExpense', {
      id: state.editingId, amount, date: $('editDate').value,
      note: $('editNote').value, categoryId: state.editSelectedCat, cardId: state.editSelectedCard, type:'expense'
    }).then(()=> { $('editModalOverlay').classList.remove('show'); toast('已儲存變更'); });
  };

  $('payCancelBtn').onclick = () => $('payModalOverlay').classList.remove('show');
  $('paySaveBtn').onclick = () => {
    const amount = parseFloat($('payAmount').value);
    if(!amount || amount <= 0){ toast('請輸入正確的金額'); return; }
    apiPost('addExpense', {
      amount, date: $('payDate').value, note: $('payNote').value,
      categoryId: '', cardId: state.payingCardId, type: 'payment'
    }).then(res => {
      if(res){ $('payModalOverlay').classList.remove('show'); toast('已登記繳費'); }
    });
  };

  function initColorSwatches(containerId, colorArr, getSelected, setSelected){
    const el = $(containerId);
    el.innerHTML = '';
    colorArr.forEach(c => {
      const d = document.createElement('div');
      d.style.background = c;
      if(c === getSelected()) d.classList.add('selected');
      d.onclick = () => { setSelected(c); [...el.children].forEach(ch=>ch.classList.remove('selected')); d.classList.add('selected'); };
      el.appendChild(d);
    });
  }
  initColorSwatches('newCatColors', CATEGORY_COLORS, ()=>state.newCatColor, (c)=>state.newCatColor=c);
  initColorSwatches('newCardColors', PALETTE_ROTATION, ()=>state.newCardColor, (c)=>state.newCardColor=c);

  $('addCatBtn').onclick = () => {
    const name = $('newCatName').value.trim();
    if(!name){ toast('請輸入分類名稱'); return; }
    apiPost('addCategory', { name, color: state.newCatColor }).then(res => { if(res){ $('newCatName').value=''; toast('已新增分類'); } });
  };
  $('addCardBtn').onclick = () => {
    const name = $('newCardName').value.trim();
    if(!name){ toast('請輸入卡片名稱'); return; }
    apiPost('addCard', { name, color: state.newCardColor }).then(res => { if(res){ $('newCardName').value=''; toast('已新增卡片'); } });
  };

  $('settingsBtn').onclick = () => {
    $('webhookInput').value = state.webhookUrl;
    $('tokenInput').value = state.token;
    setConn(!!state.webhookUrl);
    $('settingsModalOverlay').classList.add('show');
  };
  $('settingsCancelBtn').onclick = () => $('settingsModalOverlay').classList.remove('show');
  $('settingsSaveBtn').onclick = () => {
    const url = $('webhookInput').value.trim();
    const token = $('tokenInput').value.trim();
    if(!url){ toast('請貼上 Web App 網址'); return; }
    if(!token){ toast('請填入通關密語'); return; }
    state.webhookUrl = url; state.token = token;
    localStorage.setItem('walletcard_webhook', url);
    localStorage.setItem('walletcard_token', token);
    apiGet().then(()=> { toast('已連接並同步資料'); $('settingsModalOverlay').classList.remove('show'); });
  };

  [ $('editModalOverlay'), $('payModalOverlay'), $('settingsModalOverlay') ].forEach(ov => {
    ov.addEventListener('click', (e) => { if(e.target === ov) ov.classList.remove('show'); });
  });

  // ---------- Boot ----------
  if(state.webhookUrl){ apiGet(); }
  else { renderAll(); setTimeout(()=> $('settingsBtn').click(), 400); }

})();
</script>
</body>
</html>
